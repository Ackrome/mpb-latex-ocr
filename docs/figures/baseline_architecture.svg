<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1360" viewBox="0 0 1800 1360" role="img" aria-labelledby="title desc">
  <title id="title">MPB LaTeX OCR baseline architecture</title>
  <desc id="desc">A grayscale formula image is normalized, encoded by a four-stage CNN into 1024 visual tokens, and decoded by a four-layer pre-norm Transformer decoder into LaTeX token logits.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#1f4e79"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#64748b"/>
    </marker>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .section { font: 700 19px Arial, sans-serif; fill: #111827; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .text { font: 400 12.5px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #475569; }
      .mono { font: 400 12px Consolas, Menlo, monospace; fill: #334155; }
      .shape { stroke: #334155; stroke-width: 1.3; }
      .input { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
      .prep { fill: #f1f5f9; stroke: #475569; stroke-width: 1.4; }
      .conv { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; }
      .memory { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; }
      .embed { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.5; }
      .decoder { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; }
      .attn { fill: #fce7f3; stroke: #be185d; stroke-width: 1.3; }
      .ffn { fill: #fef3c7; stroke: #b45309; stroke-width: 1.3; }
      .norm { fill: #ecfccb; stroke: #4d7c0f; stroke-width: 1.2; }
      .out { fill: #e0e7ff; stroke: #4338ca; stroke-width: 1.5; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .arrow { stroke: #1f4e79; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrowThin { stroke: #1f4e79; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .arrowGray { stroke: #64748b; stroke-width: 1.6; fill: none; marker-end: url(#arrowGray); }
      .residual { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrowGray); }
      .dash { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-dasharray: 6 6; }
      .tableLine { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1360"/>

  <text x="48" y="48" class="title">MPB LaTeX OCR Baseline: CNN Visual Encoder + Autoregressive Transformer Decoder</text>
  <text x="48" y="76" class="subtitle">Implemented baseline, not a vanilla Transformer encoder-decoder and not a U-Net. Shapes are for image_height=128, image_width=512, d_model=256, max_seq_len=256.</text>

  <text x="48" y="126" class="section">1. Image Preprocessing and CNN Encoder</text>
  <text x="48" y="356" class="section">2. Token Decoder and Output Objective</text>

  <!-- Input and preprocessing -->
  <rect x="48" y="155" width="190" height="118" rx="10" class="input"/>
  <text x="70" y="184" class="label">Formula crop</text>
  <text x="70" y="209" class="text">single cropped expression</text>
  <text x="70" y="233" class="mono">B x 1 x H x W</text>
  <text x="70" y="255" class="tiny">source image may be variable size</text>

  <line x1="238" y1="214" x2="286" y2="214" class="arrow"/>

  <rect x="288" y="155" width="218" height="118" rx="10" class="prep"/>
  <text x="310" y="184" class="label">Resize, pad, normalize</text>
  <text x="310" y="209" class="text">preserve aspect ratio</text>
  <text x="310" y="233" class="text">pad to fixed canvas</text>
  <text x="310" y="255" class="mono">B x 1 x 128 x 512</text>

  <line x1="506" y1="214" x2="554" y2="214" class="arrow"/>

  <rect x="556" y="145" width="210" height="138" rx="10" class="conv"/>
  <text x="578" y="175" class="label">Conv block 1</text>
  <text x="578" y="200" class="text">Conv2d 3x3, stride 2, pad 1</text>
  <text x="578" y="223" class="text">1 -> 32, BatchNorm, GELU</text>
  <text x="578" y="248" class="mono">B x 32 x 64 x 256</text>
  <text x="578" y="269" class="tiny">downsample factor: 2</text>

  <line x1="766" y1="214" x2="812" y2="214" class="arrow"/>

  <rect x="814" y="145" width="210" height="138" rx="10" class="conv"/>
  <text x="836" y="175" class="label">Conv block 2</text>
  <text x="836" y="200" class="text">Conv2d 3x3, stride 2, pad 1</text>
  <text x="836" y="223" class="text">32 -> 64, BatchNorm, GELU</text>
  <text x="836" y="248" class="mono">B x 64 x 32 x 128</text>
  <text x="836" y="269" class="tiny">downsample factor: 4</text>

  <line x1="1024" y1="214" x2="1070" y2="214" class="arrow"/>

  <rect x="1072" y="145" width="210" height="138" rx="10" class="conv"/>
  <text x="1094" y="175" class="label">Conv block 3</text>
  <text x="1094" y="200" class="text">Conv2d 3x3, stride 2, pad 1</text>
  <text x="1094" y="223" class="text">64 -> 128, BatchNorm, GELU</text>
  <text x="1094" y="248" class="mono">B x 128 x 16 x 64</text>
  <text x="1094" y="269" class="tiny">downsample factor: 8</text>

  <line x1="1282" y1="214" x2="1328" y2="214" class="arrow"/>

  <rect x="1330" y="145" width="218" height="138" rx="10" class="conv"/>
  <text x="1352" y="175" class="label">Projection conv</text>
  <text x="1352" y="200" class="text">Conv2d 3x3, stride 1, pad 1</text>
  <text x="1352" y="223" class="text">128 -> 256, BN, GELU</text>
  <text x="1352" y="246" class="text">Dropout2d(p=0.1)</text>
  <text x="1352" y="270" class="mono">B x 256 x 16 x 64</text>

  <!-- Visual memory -->
  <path d="M1439 283 C1439 303, 1439 313, 1439 330" class="arrow"/>
  <rect x="1320" y="330" width="380" height="144" rx="12" class="memory"/>
  <text x="1345" y="362" class="label">Flattened visual memory</text>
  <text x="1345" y="387" class="text">spatial grid 16 x 64 = 1024 visual tokens</text>
  <text x="1345" y="411" class="text">transpose to sequence, then Linear 256 -> 256</text>
  <text x="1345" y="438" class="mono">memory: B x 1024 x 256</text>
  <text x="1345" y="460" class="tiny">used as key/value memory for cross-attention</text>

  <!-- Memory token miniature -->
  <rect x="1585" y="355" width="74" height="82" rx="4" fill="#bbf7d0" stroke="#15803d" stroke-width="1"/>
  <line x1="1598" y1="369" x2="1648" y2="369" class="tableLine"/>
  <line x1="1598" y1="386" x2="1648" y2="386" class="tableLine"/>
  <line x1="1598" y1="403" x2="1648" y2="403" class="tableLine"/>
  <line x1="1598" y1="420" x2="1648" y2="420" class="tableLine"/>
  <text x="1582" y="453" class="tiny">1024 x 256</text>

  <!-- Decoder input branch -->
  <rect x="48" y="560" width="238" height="126" rx="10" class="input"/>
  <text x="70" y="590" class="label">Ground-truth LaTeX tokens</text>
  <text x="70" y="615" class="text">regex tokenizer with special tokens</text>
  <text x="70" y="639" class="mono">&lt;bos&gt;, y1, ..., yT, &lt;eos&gt;</text>
  <text x="70" y="663" class="tiny">teacher forcing during training</text>

  <line x1="286" y1="623" x2="334" y2="623" class="arrow"/>

  <rect x="336" y="560" width="250" height="126" rx="10" class="prep"/>
  <text x="358" y="590" class="label">Shift right</text>
  <text x="358" y="615" class="text">decoder input prefix</text>
  <text x="358" y="639" class="mono">&lt;bos&gt;, y1, ..., yT</text>
  <text x="358" y="663" class="text">target is next token sequence</text>

  <line x1="586" y1="623" x2="634" y2="623" class="arrow"/>

  <rect x="636" y="550" width="300" height="146" rx="10" class="embed"/>
  <text x="660" y="582" class="label">Token + position embedding</text>
  <text x="660" y="607" class="text">token embedding: vocab 543 x 256</text>
  <text x="660" y="631" class="text">learned absolute positions: 256 x 256</text>
  <text x="660" y="656" class="mono">decoder states: B x T x 256</text>
  <text x="660" y="678" class="tiny">T &lt;= max_seq_len = 256</text>

  <line x1="936" y1="623" x2="984" y2="623" class="arrow"/>

  <!-- Decoder stack -->
  <rect x="986" y="520" width="470" height="362" rx="14" class="decoder"/>
  <text x="1014" y="554" class="label">TransformerDecoderLayer x 4, pre-norm</text>
  <text x="1014" y="577" class="tiny">PyTorch nn.TransformerDecoderLayer(norm_first=True)</text>

  <rect x="1030" y="600" width="372" height="54" rx="9" class="norm"/>
  <text x="1054" y="632" class="label">LayerNorm + masked multi-head self-attention</text>
  <text x="1054" y="649" class="tiny">8 heads, head dim 32, causal mask over target prefix</text>
  <path d="M1402 627 C1440 627, 1440 694, 1402 694" class="residual"/>
  <text x="1412" y="663" class="tiny">residual</text>

  <rect x="1030" y="686" width="372" height="54" rx="9" class="attn"/>
  <text x="1054" y="718" class="label">LayerNorm + cross-attention to visual memory</text>
  <text x="1054" y="735" class="tiny">queries from text states, keys/values from 1024 image tokens</text>
  <path d="M1402 713 C1440 713, 1440 780, 1402 780" class="residual"/>
  <text x="1412" y="749" class="tiny">residual</text>

  <rect x="1030" y="772" width="372" height="54" rx="9" class="ffn"/>
  <text x="1054" y="804" class="label">LayerNorm + feed-forward network</text>
  <text x="1054" y="821" class="tiny">Linear 256 -> 1024, GELU, Dropout, Linear 1024 -> 256</text>
  <path d="M1402 799 C1440 799, 1440 856, 1402 856" class="residual"/>
  <text x="1412" y="835" class="tiny">residual</text>

  <text x="1014" y="861" class="tiny">Dropout p=0.1 in attention and feed-forward sublayers</text>

  <path d="M1320 474 C1194 528, 1194 713, 1032 713" class="arrowGray"/>
  <text x="1234" y="538" class="tiny">visual memory as K,V</text>

  <line x1="1456" y1="701" x2="1510" y2="721" class="arrow"/>

  <rect x="1512" y="642" width="230" height="158" rx="12" class="out"/>
  <text x="1536" y="675" class="label">Output projection</text>
  <text x="1536" y="701" class="text">final LayerNorm</text>
  <text x="1536" y="725" class="text">Linear 256 -> vocab</text>
  <text x="1536" y="751" class="mono">logits: B x T x 543</text>
  <text x="1536" y="776" class="tiny">CE applies softmax internally</text>

  <line x1="1627" y1="800" x2="1627" y2="852" class="arrow"/>

  <rect x="1512" y="854" width="230" height="120" rx="12" class="note"/>
  <text x="1536" y="887" class="label">Decoded sequence</text>
  <text x="1536" y="912" class="text">training: next-token CE</text>
  <text x="1536" y="936" class="text">inference: greedy argmax</text>
  <text x="1536" y="958" class="tiny">stop at &lt;eos&gt; or max length</text>

  <!-- Training details -->
  <rect x="48" y="1020" width="842" height="286" rx="14" class="note"/>
  <text x="78" y="1056" class="section">Training and Evaluation Semantics</text>
  <line x1="78" y1="1074" x2="850" y2="1074" class="tableLine"/>
  <text x="78" y="1104" class="label">Objective</text>
  <text x="250" y="1104" class="text">teacher-forced next-token CrossEntropyLoss over normalized LaTeX tokens; PAD ignored</text>
  <text x="78" y="1138" class="label">Input target split</text>
  <text x="250" y="1138" class="mono">decoder input: &lt;bos&gt;, y1, ..., yT     target: y1, ..., yT, &lt;eos&gt;</text>
  <text x="78" y="1172" class="label">Optimizer</text>
  <text x="250" y="1172" class="text">AdamW, lr 3e-4, weight_decay 0.01, cosine schedule with 5 percent warmup, grad clip 1.0</text>
  <text x="78" y="1206" class="label">Validation</text>
  <text x="250" y="1206" class="text">greedy decoded strings; exact match and normalized edit distance after LaTeX normalization</text>
  <text x="78" y="1240" class="label">Render metrics</text>
  <text x="250" y="1240" class="text">computed by evaluation scripts; official CDM is external to the training loop</text>
  <text x="78" y="1274" class="label">Current run</text>
  <text x="250" y="1274" class="text">vocab size 543, max generation length 256, total parameters 5,012,959</text>

  <!-- Parameter table -->
  <rect x="938" y="1020" width="804" height="286" rx="14" class="note"/>
  <text x="968" y="1056" class="section">Parameter Breakdown for Current Tokenizer</text>
  <line x1="968" y1="1074" x2="1702" y2="1074" class="tableLine"/>
  <text x="980" y="1102" class="label">Component</text>
  <text x="1288" y="1102" class="label">Role</text>
  <text x="1645" y="1102" class="label">Params</text>
  <line x1="968" y1="1116" x2="1702" y2="1116" class="tableLine"/>
  <text x="980" y="1144" class="text">CNN encoder</text>
  <text x="1288" y="1144" class="text">learn visual features and downsample to 16 x 64</text>
  <text x="1640" y="1144" class="mono">454,592</text>
  <line x1="968" y1="1158" x2="1702" y2="1158" class="tableLine"/>
  <text x="980" y="1186" class="text">Token embedding</text>
  <text x="1288" y="1186" class="text">map LaTeX tokens to d_model</text>
  <text x="1640" y="1186" class="mono">139,008</text>
  <line x1="968" y1="1200" x2="1702" y2="1200" class="tableLine"/>
  <text x="980" y="1228" class="text">Position embedding</text>
  <text x="1288" y="1228" class="text">learn target sequence positions</text>
  <text x="1645" y="1228" class="mono">65,536</text>
  <line x1="968" y1="1242" x2="1702" y2="1242" class="tableLine"/>
  <text x="980" y="1270" class="text">Transformer decoder</text>
  <text x="1288" y="1270" class="text">4 layers of self-attn, cross-attn, FFN</text>
  <text x="1628" y="1270" class="mono">4,213,760</text>
  <line x1="968" y1="1284" x2="1702" y2="1284" class="tableLine"/>
  <text x="980" y="1312" class="text">Final norm + output projection</text>
  <text x="1288" y="1312" class="text">produce vocabulary logits</text>
  <text x="1634" y="1312" class="mono">140,063</text>
  <line x1="968" y1="1326" x2="1702" y2="1326" class="tableLine"/>
  <text x="980" y="1354" class="label">Total</text>
  <text x="1288" y="1354" class="text">changes when vocabulary changes</text>
  <text x="1628" y="1354" class="mono">5,012,959</text>
</svg>
